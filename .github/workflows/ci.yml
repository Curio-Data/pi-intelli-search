name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint markdown for em-dashes
        run: |
          # Enforce AGENTS.md Rule 1: no typographic em-dashes (U+2014).
          # AGENTS.md is excluded because it must contain the character to illustrate the rule.
          violations=$(grep -RPn $'—' --include='*.md' --exclude-dir=node_modules . | grep -Ev '^(\./)?AGENTS\.md:' || true)
          if [ -n "$violations" ]; then
            echo "::error::Em-dash (U+2014) found. See AGENTS.md Rule 1."
            echo "$violations"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify package tarball
        run: npm pack --dry-run

      - name: Install-fresh smoke test (peer-dep drift guard)
        run: ./test/run-e2e-publish-local.sh
        env:
          TMPDIR: ${{ runner.temp }}
